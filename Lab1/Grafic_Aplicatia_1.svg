<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <rect width="640" height="420" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700">Aplicatia 1: conversia Celsius - Fahrenheit</text>

  <line x1="60" y1="340" x2="560" y2="340" stroke="#222" stroke-width="2"/>
  <line x1="60" y1="340" x2="60" y2="70" stroke="#222" stroke-width="2"/>

  <text x="310" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">Temperatura [grade C]</text>
  <text x="18" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" transform="rotate(-90 18 210)">Temperatura [grade F]</text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#222">
    <line x1="60" y1="340" x2="60" y2="345" stroke="#222"/>
    <text x="60" y="362" text-anchor="middle">0</text>
    <line x1="160" y1="340" x2="160" y2="345" stroke="#222"/>
    <text x="160" y="362" text-anchor="middle">20</text>
    <line x1="260" y1="340" x2="260" y2="345" stroke="#222"/>
    <text x="260" y="362" text-anchor="middle">40</text>
    <line x1="360" y1="340" x2="360" y2="345" stroke="#222"/>
    <text x="360" y="362" text-anchor="middle">60</text>
    <line x1="460" y1="340" x2="460" y2="345" stroke="#222"/>
    <text x="460" y="362" text-anchor="middle">80</text>
    <line x1="560" y1="340" x2="560" y2="345" stroke="#222"/>
    <text x="560" y="362" text-anchor="middle">100</text>

    <line x1="55" y1="340" x2="60" y2="340" stroke="#222"/>
    <text x="48" y="344" text-anchor="end">32</text>
    <line x1="55" y1="275" x2="60" y2="275" stroke="#222"/>
    <text x="48" y="279" text-anchor="end">77</text>
    <line x1="55" y1="210" x2="60" y2="210" stroke="#222"/>
    <text x="48" y="214" text-anchor="end">122</text>
    <line x1="55" y1="145" x2="60" y2="145" stroke="#222"/>
    <text x="48" y="149" text-anchor="end">167</text>
    <line x1="55" y1="80" x2="60" y2="80" stroke="#222"/>
    <text x="48" y="84" text-anchor="end">212</text>
  </g>

  <g stroke="#d8dde6" stroke-width="1">
    <line x1="160" y1="70" x2="160" y2="340"/>
    <line x1="260" y1="70" x2="260" y2="340"/>
    <line x1="360" y1="70" x2="360" y2="340"/>
    <line x1="460" y1="70" x2="460" y2="340"/>
    <line x1="560" y1="70" x2="560" y2="340"/>
    <line x1="60" y1="275" x2="560" y2="275"/>
    <line x1="60" y1="210" x2="560" y2="210"/>
    <line x1="60" y1="145" x2="560" y2="145"/>
    <line x1="60" y1="80" x2="560" y2="80"/>
  </g>

  <line x1="60" y1="340" x2="560" y2="80" stroke="#1f78b4" stroke-width="3"/>
  <line x1="372.5" y1="340" x2="372.5" y2="177.5" stroke="#e31a1c" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="60" y1="177.5" x2="372.5" y2="177.5" stroke="#e31a1c" stroke-width="1.5" stroke-dasharray="5 5"/>
  <circle cx="372.5" cy="177.5" r="6" fill="#e31a1c"/>
  <text x="390" y="171" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#e31a1c">62,5 grade C = 144,5 grade F</text>

  <text x="400" y="105" font-family="Arial, sans-serif" font-size="13" fill="#1f78b4">tF = 1,8 tC + 32</text>
</svg>
